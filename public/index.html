<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Parameter Monitoring</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="/static/styles.css?v=6">
</head>
<body>
    <div class="app-container">
        <!-- Top Horizontal Filter Bar -->
        <nav class="top-filter-bar glass-panel">
            <!-- Data Source -->
            <div class="filter-group">
                <label for="dataset-select">Dataset</label>
                <div class="flex-row">
                    <select id="dataset-select" class="glass-input compact"></select>
                    <label for="csv-upload" class="glass-button secondary compact" title="Upload New CSV">➕</label>
                    <input type="file" id="csv-upload" accept=".csv" style="display: none;">
                    <button id="clear-datasets" class="glass-button secondary compact" style="color: #ef4444;" title="Clear All Datasets">🗑️</button>
                </div>
                <p id="upload-status" class="subtitle" style="font-size: 0.75rem; margin-top: 4px;"></p>
            </div>
            
            <div class="filter-divider"></div>

            <!-- Bus Filter -->
            <div class="filter-group">
                <label for="bus-select">Bus</label>
                <select id="bus-select" class="glass-input compact">
                    <option value="All Buses">All Buses</option>
                </select>
            </div>
            
            <!-- Condition Filter -->
            <div class="filter-group">
                <label>Condition</label>
                <div class="radio-group horizontal">
                    <label><input type="radio" name="condition" value="All Records" checked> All</label>
                    <label><input type="radio" name="condition" value="Normal Only"> Normal</label>
                    <label><input type="radio" name="condition" value="Fault Only"> Fault</label>
                </div>
            </div>

            <!-- Record Range -->
            <div class="filter-group">
                <label>Range</label>
                <div class="range-inputs compact-range">
                    <input type="number" id="record-start" class="glass-input compact" value="1" min="1">
                    <span>-</span>
                    <input type="number" id="record-end" class="glass-input compact" value="2000" min="1">
                </div>
            </div>

            <div class="filter-divider"></div>
            
            <!-- Trend Parameter -->
            <div class="filter-group">
                <label for="trend-param">Trend</label>
                <select id="trend-param" class="glass-input compact">
                    <option value="Voltage">Voltage</option>
                    <option value="Current">Current</option>
                    <option value="Frequency">Frequency</option>
                    <option value="Voltage_Angle">V. Angle</option>
                    <option value="Current_Angle">C. Angle</option>
                    <option value="Apparent_Power">Power</option>
                    <option value="Power_Factor">PF</option>
                </select>
            </div>
            
            <div class="spacer"></div>
            <button id="apply-btn" class="glass-button primary compact-btn">Apply Filters</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header glass-panel">
                <div class="header-titles">
                    <h1>⚡ Electrical Parameter Monitoring</h1>
                    <p id="header-status" class="subtitle">Loading data...</p>
                </div>
                <div class="status-badge">
                    <span class="pulse-dot"></span> System Online
                </div>
            </header>

            <section class="kpi-grid">
                <div class="kpi-card glass-panel" id="kpi-voltage">
                    <div class="kpi-title">⚡ Avg Voltage</div>
                    <div class="kpi-value">--</div>
                    <div class="kpi-delta">--</div>
                </div>
                <div class="kpi-card glass-panel" id="kpi-current">
                    <div class="kpi-title">🔌 Avg Current</div>
                    <div class="kpi-value">--</div>
                    <div class="kpi-delta">--</div>
                </div>
                <div class="kpi-card glass-panel" id="kpi-freq">
                    <div class="kpi-title">🌀 Avg Frequency</div>
                    <div class="kpi-value">--</div>
                    <div class="kpi-delta">--</div>
                </div>
                <div class="kpi-card glass-panel" id="kpi-fault-rate">
                    <div class="kpi-title">🔴 Fault Rate</div>
                    <div class="kpi-value">--</div>
                    <div class="kpi-delta">--</div>
                </div>
                <div class="kpi-card glass-panel normal-card" id="kpi-normal">
                    <div class="kpi-title">✅ Normal Records</div>
                    <div class="kpi-value">--</div>
                    <div class="kpi-delta">--</div>
                </div>
                <div class="kpi-card glass-panel fault-card" id="kpi-fault">
                    <div class="kpi-title">⚠️ Fault Records</div>
                    <div class="kpi-value">--</div>
                    <div class="kpi-delta">--</div>
                </div>
            </section>

            <section class="chart-section glass-panel">
                <div class="section-header">
                    <h2>📈 Trend Analysis</h2>
                </div>
                <div id="trend-chart" class="plot-container"></div>
            </section>

            <div class="charts-row">
                <section class="chart-section glass-panel half-width">
                    <div class="section-header">
                        <h2>🔍 Fault Distribution</h2>
                    </div>
                    <div id="pie-chart" class="plot-container small-plot"></div>
                </section>
                <section class="chart-section glass-panel half-width">
                    <div class="section-header">
                        <h2>🔵 Voltage vs Current Scatter</h2>
                    </div>
                    <div id="scatter-chart" class="plot-container small-plot"></div>
                </section>
            </div>

            <section class="chart-section glass-panel">
                <div class="section-header">
                    <h2>🏥 Bus Health Scorecard</h2>
                </div>
                <div id="scorecard-chart" class="plot-container"></div>
            </section>
            
        </main>
    </div>

    <!-- Scripts -->
    <script src="/static/app.js?v=5"></script>
</body>
</html>
